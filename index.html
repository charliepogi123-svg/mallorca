<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login</title>
</head>
<body>
    <table>
        <tr>
            <td>
                <h1><font face="algerian">Login</font></h1>
             
                <form>
                    <label for="username">Username:</label><br/>
                    <input type="text" id="username" name="username" placeholder="Enter username"/><br/><br/>    
                    
                    <label for="password">Password:</label><br/>
                    <input type="password" id="password" name="password" placeholder="Enter password"/><br/><br/>
                    
                    <center>
                    <input type="checkbox" id="remember" name="remember"/>   
                    <label for="remember">Remember me</label><br/><br/>
                    </center>
                    
                    <center>
                    <button type="button" id="button1" onclick="checkLogin()">Submit</button>
                    <button type="button" id="button2" onclick="clearForm()">Cancel</button>
                    </center>
                        
                    <!-- Error message  -->
                    <p id="error-message" style="display:none; color:red; text-align:center;">Wrong username or password!</p>
                </form>
            </td>
        </tr>
    </table>

    <!-- CSS design -->
    <style>
        body {
            background-color:  lightskyblue; 
        }
        
        table {
            width: 400px;
            margin: 65px auto;
            border: 5px solid lightblue;
            border-radius: 30px;
            background-color: #FFF0F5;
            padding: 40px;
        }
        
        h1 {
            text-align: center;
            color: lightskyblue; 
        }
        
        #username, #password {
            width: 95%;
            padding: 15px;
            border-radius: 9px;
            border: 2px solid skyblue;
            margin-bottom: 15px;
        }
        
        #button1 {
            padding: 10px 20px;
            background-color: lightskyblue;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        
        #button2 {
            padding: 10px 20px;
            background-color: lightskyblue;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        
        #button1:hover { background-color: lightblue; }
        #button2:hover { background-color: lightblue; }
    </style>
    
    <script>
        /* Correct login details */
        var correctUsername = "admin";
        var correctPassword = "1234";
        
        /* Check if username and password correct */
        function checkLogin() {
            var enteredUsername = document.getElementById("username").value;
            var enteredPassword = document.getElementById("password").value;
            
            if (enteredUsername === correctUsername && enteredPassword === correctPassword) {
                alert("Login successful!");
                window.location.href = "abtme.html"; 
            } else {
                document.getElementById("error-message").style.display = "block";
            }
        }
        
        /* Clear form when cancel */
        function clearForm() {
            document.getElementById("username").value = "";
            document.getElementById("password").value = "";
            document.getElementById("error-message").style.display = "none";
        }
    </script>
</body>
</html>
